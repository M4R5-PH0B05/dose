{% load static %}
<!doctype html>
<html lang="en" class="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="{% static 'tracker/output.css' %}">        <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
        <title>Dose - {% block title %}{% endblock %}</title>
        <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
        <script>document.addEventListener('DOMContentLoaded', () => lucide.createIcons())</script>
    </head>
    <body class="min-h-screen bg-background text-foreground">
        <header class="border-b px-6 py-4">
            <div class="mx-auto max-w-5xl flex items-center">
                <span class="text-lg font-semibold">Dose</span>
                <div class="flex gap-2 ml-auto">
                    {% if request.user.is_authenticated %}
                        {% block header_actions %}{% endblock %}
                      <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-secondary" type="submit">Log out</button>
                      </form>
                    {% else %}
                      <a href="{% url 'login' %}" class="btn btn-sm btn-secondary">Log in</a>
                    {% endif %}
                </div>
            </div>
        </header>
        <main class="py-6">
            {% block content %}{% endblock %}
        </main>
        {% block dialogs %}{% endblock %}
    </body>
</html>
